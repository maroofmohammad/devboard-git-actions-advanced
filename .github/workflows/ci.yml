# Goal - I have to Lint, Build, Test the code for Frontend and Backend
# Then push the images to DockerHub

name: CI

on:
  push:
    branches:
      - ci-cd-practice

jobs:

    frontend:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                node-version: '20'
                cache: npm
                cache-dependency-path: frontend/package-lock.json

            - name: Install npm packages
              run: npm install
              working-directory: frontend
            
            - name: Run Lint
              run: npm run lint
              working-directory: frontend

            - name: Run Tests
              run: npm run test
              working-directory: frontend

            - name: Log in to DockerHub
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v7
              with:
                context: ./frontend
                file: ./frontend/Dockerfile.multistage
                push: true
                tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-frontend:latest


    backend:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Set up GO
              uses: actions/setup-go@v6
              with:
                go-version: '1.23'
                go-version-file: backend/go.mod
                cache-dependency-path: go.sum

            - name: Run go formatter
              run: go fmt
              working-directory: backend
            
            - name: Run go vet
              run: go vet
              working-directory: backend

            - name: Run Tests
              run: go test
              working-directory: backend

            - name: Log in to DockerHub
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v7
              with:
                context: ./backend
                file: ./backend/Dockerfile
                push: true
                tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-backend:latest


        
